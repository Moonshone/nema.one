<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="nema.one - Moderne React Website" />
    <title>nema.one</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17351f;
        background: #f2ffe4;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
      }

      .staticHomePage {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      .staticHomePage .heroCard {
        width: min(100%, 760px);
        padding: clamp(32px, 8vw, 80px);
        border: 1px solid rgba(23, 53, 31, 0.12);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.48);
        box-shadow: 0 24px 80px rgba(23, 53, 31, 0.12);
      }

      .staticHomePage .eyebrow {
        margin: 0 0 18px;
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .staticHomePage h1 {
        margin: 0;
        font-size: clamp(3rem, 10vw, 7rem);
        line-height: 1;
        letter-spacing: -0.06em;
      }

      .staticHomePage .intro {
        max-width: 600px;
        margin: 24px auto 0;
        color: #3d5a44;
        font-size: clamp(1.05rem, 2.5vw, 1.35rem);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="homePage staticHomePage">
        <section class="heroCard" aria-labelledby="static-welcome-heading">
          <p class="eyebrow">NEMA.one</p>
          <h1 id="static-welcome-heading">Herzlich Willkommen!</h1>
          <p class="intro">
            Wähle im Header Deutsch oder Englisch, sobald die interaktive Webseite geladen ist.
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
