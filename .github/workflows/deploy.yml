name: Deploy to nema.one

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pakete installieren
        run: npm install

      - name: Projekt bauen
        run: npm run build

      - name: Build prüfen
        run: |
          test -f dist/index.html
          find dist -maxdepth 2 -type f

      - name: FTP-Servernamen prüfen
        env:
          FTP_SERVER_RAW: ${{ secrets.FTP_SERVER || secrets.FTP_HOST || secrets.FTP }}
        run: |
          python - <<'PY'
          import os
          import sys
          from urllib.parse import urlparse

          raw_server = os.environ.get('FTP_SERVER_RAW', '').strip()

          if not raw_server:
              sys.exit('FTP_SERVER secret is empty. Add the FTP hostname in GitHub repository secrets.')

          parsed = urlparse(raw_server if '://' in raw_server else f'//{raw_server}')
          ftp_host = parsed.hostname or raw_server.split('/')[0].split(':')[0]

          if not ftp_host:
              sys.exit('FTP_SERVER secret must contain a hostname, for example ftp.example.com without a path.')

          if ftp_host.lower() in {'name', 'hostname', 'host', 'ftp'}:
              sys.exit('FTP_SERVER must be the real FTP server hostname from your hosting provider, not a placeholder like name or hostname.')

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as github_env:
              github_env.write(f'FTP_SERVER_HOST={ftp_host}\n')

          print(f'FTP server hostname normalized ({len(ftp_host)} characters).')
          PY

      - name: Build per FTP hochladen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_SERVER_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /www/
